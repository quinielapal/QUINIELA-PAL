<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quiniela San José</title>

<style>
body{
    font-family:Arial, sans-serif;
    background:#f2f2f2;
    margin:0;
    padding:20px;
}

h1{
    text-align:center;
    color:#0b5ed7;
}

.tarjeta{
    background:white;
    padding:20px;
    border-radius:10px;
    max-width:700px;
    margin:auto;
    box-shadow:0 0 10px rgba(0,0,0,.2);
}

.partido{
    display:flex;
    justify-content:space-between;
    margin:15px 0;
}

button{
    padding:10px 15px;
    margin:3px;
    border:none;
    border-radius:8px;
    cursor:pointer;
}

.local{
    background:#198754;
    color:white;
}

.empate{
    background:#ffc107;
}

.visitante{
    background:#dc3545;
    color:white;
}
</style>

</head>

<body>

<div class="tarjeta">

<h1>🏆 Quiniela San José</h1>

<h3>Bolsa acumulada: $3,500</h3>

<hr>

<div class="partido">
<span>América vs Chivas</span>

<div>
<button class="local">L</button>
<button class="empate">E</button>
<button class="visitante">V</button>
</div>

</div>

<div class="partido">
<span>Tigres vs Cruz Azul</span>

<div>
<button class="local">L</button>
<button class="empate">E</button>
<button class="visitante">V</button>
</div>

</div>

</div>

</body>
</html>
